<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>N-back Game</title>
<style>
:root{
  --teal:#4ECDC4;--teal-light:#a8edea;--bg:#f0f4f8;
  --white:#fff;--gray:#c0c8d0;--gray-dark:#7a8a9a;--text:#2d3a45;
  --inactive:#dde3e9;--shadow:0 4px 16px rgba(78,205,196,0.13);
  --blue:#4a90d9;--blue-light:#d0e8f8;--red:#d94a4a;--red-light:#f8d0d0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;overflow:hidden;color:var(--text);}
.screen{display:none;width:100%;height:100%;}
.screen.active{display:flex;}

/* HOME */
#homeScreen{flex-direction:column;align-items:center;justify-content:center;gap:36px;background:linear-gradient(135deg,#e8f8f7 0%,#f0f4f8 100%);}
.home-title{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-1px;}
.home-btns{display:flex;gap:24px;}
.home-btn{width:160px;height:160px;border-radius:24px;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);transition:transform 0.13s;}
.home-btn.magic{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
.home-btn.shape{background:linear-gradient(135deg,#4ECDC4,#2eb8ae);color:#fff;}
.home-btn:hover{transform:translateY(-4px);}
.home-btn:active{transform:scale(0.97);}
.home-btn-icon{font-size:48px;line-height:1;}

/* MAGIC START */
#magicStartScreen{flex-direction:column;align-items:center;justify-content:center;gap:32px;background:linear-gradient(135deg,#e8f8f7 0%,#f0f4f8 100%);position:relative;}
.magic-title{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-1px;}
.magic-desc{font-size:14px;color:var(--gray-dark);text-align:center;line-height:1.8;}
.magic-start-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:18px;padding:18px 56px;font-size:20px;font-weight:700;cursor:pointer;transition:transform 0.13s;}
.magic-start-btn:hover{transform:translateY(-2px);}

/* EXIT */
.exit-top{position:absolute;top:14px;left:14px;background:var(--white);border:1.5px solid var(--gray);border-radius:10px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--gray-dark);cursor:pointer;z-index:10;}
.exit-top:hover{background:#ffe0e0;border-color:#f08080;color:#c0392b;}

/* MAGIC GAME */
#magicGameScreen{
  height:100%;background:#f5f5f5;position:relative;
  flex-direction:row;align-items:stretch;
  padding:52px 12px 12px 12px;gap:8px;
}

/* 각 열 */
.combo-col{
  display:flex;flex-direction:column;
  gap:8px;flex:1;
  align-items:stretch;
  justify-content:center;
}

/* 각 카드: 2×2 그리드, 비율 유지 */
.combo-card{
  background:var(--white);border-radius:10px;
  border:2px solid #d0d8e0;
  cursor:pointer;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:4px;padding:6px;
  position:relative;
  transition:transform 0.12s,border-color 0.12s,box-shadow 0.12s;
  /* 크기는 JS에서 동적으로 설정 */
}
.combo-card:hover{transform:scale(1.03);border-color:#aaa;box-shadow:0 4px 14px rgba(0,0,0,0.12);}
.combo-card:active{transform:scale(0.97);}

/* 미니카드: 부모를 꽉 채움 */
.mini-card{
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  min-height:0; /* flex 자식이 넘치지 않도록 */
}
.mini-card.back{background:#c0c8d4;}
.mini-card.front{background:#eaf5e4;}
.mini-card svg{width:65%;height:65%;}

/* 배지: 파란/빨간 */
.count-badge{
  position:absolute;top:-8px;right:-8px;
  font-size:11px;font-weight:800;
  border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #f5f5f5;
}
.count-badge.blue{background:var(--blue);color:#fff;}
.count-badge.red{background:var(--red);color:#fff;}

/* PREDICTION OVERLAY */
.pred-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  align-items:center;justify-content:center;
  z-index:100;flex-direction:column;gap:32px;
}
.pred-overlay.show{display:flex;}
.pred-title{font-size:18px;font-weight:700;color:#fff;}
.pred-potions{display:flex;gap:36px;}
.pred-potion{
  width:140px;height:168px;border-radius:22px;
  border:3px solid rgba(255,255,255,0.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;font-size:17px;font-weight:700;cursor:pointer;
  transition:transform 0.13s;
}
.pred-potion.blue{background:var(--blue-light);color:var(--blue);}
.pred-potion.red{background:var(--red-light);color:var(--red);}
.pred-potion:hover{transform:scale(1.05);}
.pred-potion svg{width:64px;height:80px;}
@keyframes glowYellow{
  0%,100%{box-shadow:0 0 0 0 rgba(255,210,0,0.9),0 0 16px 4px rgba(255,210,0,0.35);}
  50%{box-shadow:0 0 0 10px rgba(255,210,0,0),0 0 6px 2px rgba(255,210,0,0);}
}
.pred-potion.glowing{border-color:#ffd200;animation:glowYellow 0.85s infinite;}

/* SHAPE START */
#shapeStartScreen{flex-direction:column;align-items:center;justify-content:center;gap:32px;background:linear-gradient(135deg,#e8f8f7 0%,#f0f4f8 100%);position:relative;}

/* SHAPE GAME */
#shapeGameScreen{flex-direction:row;height:100%;}
.left-panel{width:220px;min-width:170px;background:var(--white);border-right:1.5px solid #e0e8ef;display:flex;flex-direction:column;align-items:center;padding:12px 8px;gap:8px;overflow-y:auto;}
.panel-title{font-size:12px;font-weight:700;color:var(--gray-dark);letter-spacing:1px;margin-bottom:4px;align-self:flex-start;padding-left:4px;}
.shape-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;}
.shape-item{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;border:2.5px solid transparent;background:var(--bg);transition:border-color 0.15s,background 0.15s,transform 0.1s;padding:6px;}
.shape-item:hover{background:var(--teal-light);transform:scale(1.06);}
.shape-item svg{width:100%;height:100%;}
.mini-shape-list{display:flex;flex-direction:column;gap:10px;width:100%;padding:4px;}
.mini-shape-item{display:flex;align-items:center;justify-content:center;height:60px;border-radius:12px;cursor:pointer;border:2.5px solid transparent;background:var(--bg);transition:border-color 0.15s,background 0.15s;padding:8px;}
.mini-shape-item:hover{background:var(--teal-light);}
.mini-shape-item svg{width:44px;height:44px;}
.main-area{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 0 14px;min-height:44px;}
.round-label{font-size:14px;font-weight:700;color:var(--teal);}
.step-counter{font-size:13px;color:var(--gray-dark);}
.shape-display{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
.shape-stack{position:relative;width:300px;height:200px;}
.shape-ghost{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:20px;background:var(--white);border:1.5px solid var(--gray);}
.shape-current-card{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:20px;background:var(--white);border:2.5px solid var(--teal);box-shadow:var(--shadow);}
.empty-hint{font-size:14px;color:var(--gray);text-align:center;line-height:1.8;}
.right-panel{width:200px;min-width:160px;display:flex;flex-direction:column;align-items:stretch;justify-content:center;padding:12px 14px;gap:14px;border-left:1.5px solid #e0e8ef;background:var(--white);}
.choice-item{display:flex;align-items:center;gap:10px;border-radius:14px;padding:10px 14px;background:var(--inactive);border:2px solid transparent;transition:background 0.15s,border-color 0.15s;min-height:52px;}
.choice-item.lit{background:var(--teal-light);border-color:var(--teal);}
.choice-item.disabled{opacity:0.35;}
.choice-key{height:32px;background:var(--white);border:1.5px solid var(--gray);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text);flex-shrink:0;padding:0 8px;}
.choice-label{font-size:13px;color:var(--gray-dark);font-weight:600;line-height:1.3;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:200;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--white);border-radius:20px;padding:32px 36px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.18);max-width:340px;width:90%;}
.modal-box h3{font-size:18px;font-weight:800;margin-bottom:10px;}
.modal-box p{font-size:14px;color:var(--gray-dark);margin-bottom:24px;}
.modal-btns{display:flex;flex-direction:column;gap:10px;}
.modal-btn{padding:11px 20px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:transform 0.1s;}
.modal-btn:active{transform:scale(0.96);}
.modal-btn.cancel{background:var(--inactive);color:var(--gray-dark);}
.modal-btn.go-home{background:var(--teal);color:#fff;}
.modal-btn.go-back{background:#fff;color:var(--text);border:1.5px solid var(--gray);}

@keyframes shapeIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
.shape-animate{animation:shapeIn 0.2s cubic-bezier(.34,1.56,.64,1) both;}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="homeScreen">
  <div class="home-title">🌟 N-back Game</div>
  <div class="home-btns">
    <button class="home-btn magic" onclick="showMagicStart()"><span class="home-btn-icon">🧪</span>마법약 만들기</button>
    <button class="home-btn shape" onclick="showShapeStart()"><span class="home-btn-icon">🔷</span>도형 기억 게임</button>
  </div>
</div>

<!-- MAGIC START -->
<div class="screen" id="magicStartScreen">
  <button class="exit-top" onclick="showExitModal('magicStart')">✕ 종료</button>
  <div class="magic-title">🧪 마법약 만들기</div>
  <div class="magic-desc">14가지 재료 조합 중 하나를 선택하세요.<br>라운드가 쌓일수록 예측이 정확해집니다!</div>
  <button class="magic-start-btn" onclick="startMagicGame()">시작</button>
</div>

<!-- MAGIC GAME: 6열, 2/2/3/3/2/2 -->
<div class="screen" id="magicGameScreen">
  <button class="exit-top" onclick="showExitModal('magicGame')">✕ 종료</button>
  <div class="combo-col" id="col0"></div>
  <div class="combo-col" id="col1"></div>
  <div class="combo-col" id="col2"></div>
  <div class="combo-col" id="col3"></div>
  <div class="combo-col" id="col4"></div>
  <div class="combo-col" id="col5"></div>
</div>

<!-- PREDICTION OVERLAY -->
<div class="pred-overlay" id="predOverlay">
  <div class="pred-title">어떤 약이 만들어질까요?</div>
  <div class="pred-potions">
    <div class="pred-potion blue" id="predBlue" onclick="onChoosePotion('blue')">
      <svg viewBox="0 0 60 80"><ellipse cx="30" cy="64" rx="22" ry="14" fill="#4a90d9"/><rect x="21" y="22" width="18" height="34" rx="4" fill="#4a90d9"/><rect x="23" y="10" width="14" height="14" rx="4" fill="#7aaccc"/><ellipse cx="30" cy="64" rx="14" ry="8" fill="#6aaee8" opacity="0.5"/><ellipse cx="22" cy="54" rx="5" ry="3" fill="#fff" opacity="0.25"/></svg>
      파란약
    </div>
    <div class="pred-potion red" id="predRed" onclick="onChoosePotion('red')">
      <svg viewBox="0 0 60 80"><ellipse cx="30" cy="64" rx="22" ry="14" fill="#d94a4a"/><rect x="21" y="22" width="18" height="34" rx="4" fill="#d94a4a"/><rect x="23" y="10" width="14" height="14" rx="4" fill="#cc7a7a"/><ellipse cx="30" cy="64" rx="14" ry="8" fill="#e86a6a" opacity="0.5"/><ellipse cx="22" cy="54" rx="5" ry="3" fill="#fff" opacity="0.25"/></svg>
      빨간약
    </div>
  </div>
</div>

<!-- SHAPE START -->
<div class="screen" id="shapeStartScreen">
  <button class="exit-top" onclick="showExitModal('shapeStart')">✕ 종료</button>
  <div style="font-size:28px;font-weight:800;color:var(--text);letter-spacing:-1px;">🔷 도형 기억 게임</div>
  <div style="font-size:14px;color:var(--gray-dark);">제시된 도형의 순서를 기억하세요</div>
  <div style="display:flex;gap:20px;">
    <button class="home-btn shape" style="width:130px;height:100px;font-size:16px;" onclick="startShapeGame(1)">1라운드</button>
    <button class="home-btn shape" style="width:130px;height:100px;font-size:16px;background:linear-gradient(135deg,#fff,#e8f8f7);color:var(--teal);border:2.5px solid var(--teal);" onclick="startShapeGame(2)">2라운드</button>
  </div>
</div>

<!-- SHAPE GAME -->
<div class="screen" id="shapeGameScreen">
  <div class="left-panel" id="leftPanel">
    <div class="panel-title">도형 선택</div>
    <div id="shapeSelector"></div>
  </div>
  <div class="main-area">
    <div class="top-bar">
      <button class="exit-top" onclick="showExitModal('shapeGame')">✕ 종료</button>
      <div class="round-label" id="roundLabel">1라운드</div>
      <div class="step-counter" id="stepCounter"></div>
    </div>
    <div class="shape-display">
      <div class="empty-hint" id="emptyHint">왼쪽에서<br>도형을 선택하세요</div>
      <div class="shape-stack" id="shapeStack" style="display:none;"></div>
    </div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="exitModal">
  <div class="modal-box">
    <h3>종료</h3>
    <p id="modalMsg">어떻게 하시겠습니까?</p>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<script>
const SHAPES=[
  {id:'triangle',   svg:`<polygon points="50,8 96,92 4,92" fill="#4ECDC4"/>`},
  {id:'circle',     svg:`<circle cx="50" cy="50" r="44" fill="#4ECDC4"/>`},
  {id:'square',     svg:`<rect x="6" y="6" width="88" height="88" fill="#4ECDC4"/>`},
  {id:'trapezoid',  svg:`<polygon points="10,85 90,85 75,15 25,15" fill="#4ECDC4"/>`},
  {id:'hourglass',  svg:`<polygon points="10,5 90,5 50,50" fill="#4ECDC4"/><polygon points="10,95 90,95 50,50" fill="#4ECDC4"/>`},
  {id:'gem',        svg:`<polygon points="30,5 70,5 95,35 95,65 70,95 30,95 5,65 5,35" fill="#4ECDC4"/>`},
  {id:'diamond',    svg:`<polygon points="50,5 95,50 50,95 5,50" fill="#4ECDC4"/>`},
  {id:'bowtie',     svg:`<polygon points="5,10 50,50 5,90" fill="#4ECDC4"/><polygon points="95,10 50,50 95,90" fill="#4ECDC4"/>`},
  {id:'star',       svg:`<polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#4ECDC4"/>`},
  {id:'puzzle',     svg:`<rect x="5" y="5" width="44" height="44" fill="#4ECDC4"/><rect x="51" y="51" width="44" height="44" fill="#4ECDC4"/>`},
  {id:'icicles',    svg:`<polygon points="18,5 36,5 27,95" fill="#4ECDC4"/><polygon points="64,5 82,5 73,95" fill="#4ECDC4"/>`},
  {id:'pyramid',    svg:`<rect x="22" y="72" width="56" height="20" fill="#4ECDC4"/><rect x="30" y="52" width="40" height="22" fill="#4ECDC4"/><rect x="36" y="33" width="28" height="21" fill="#4ECDC4"/><rect x="40" y="15" width="20" height="20" fill="#4ECDC4"/>`},
  {id:'doubletri',  svg:`<polygon points="50,5 95,52 5,52" fill="#4ECDC4"/><polygon points="50,48 95,95 5,95" fill="#4ECDC4"/>`},
  {id:'flower',     svg:`<ellipse cx="50" cy="22" rx="14" ry="20" fill="#4ECDC4"/><ellipse cx="50" cy="78" rx="14" ry="20" fill="#4ECDC4"/><ellipse cx="22" cy="50" rx="20" ry="14" fill="#4ECDC4"/><ellipse cx="78" cy="50" rx="20" ry="14" fill="#4ECDC4"/>`},
  {id:'tridiamonds',svg:`<polygon points="50,5 65,50 50,95 35,50" fill="#4ECDC4"/><polygon points="30,5 45,50 30,95 15,50" fill="#4ECDC4"/><polygon points="70,5 85,50 70,95 55,50" fill="#4ECDC4"/>`},
];

const CARD_FRONTS=[
  `<svg viewBox="0 0 80 60"><rect width="80" height="60" rx="5" fill="#eaf5e4"/><ellipse cx="26" cy="36" rx="16" ry="10" fill="#5a9e4a" transform="rotate(-30 26 36)"/><ellipse cx="40" cy="28" rx="16" ry="10" fill="#6ab858" transform="rotate(10 40 28)"/><ellipse cx="54" cy="36" rx="16" ry="10" fill="#4e8c3c" transform="rotate(30 54 36)"/></svg>`,
  `<svg viewBox="0 0 80 60"><rect width="80" height="60" rx="5" fill="#eaf5e4"/><line x1="40" y1="55" x2="40" y2="7" stroke="#4a7c38" stroke-width="2"/><ellipse cx="25" cy="19" rx="13" ry="5" fill="#5a9e4a" transform="rotate(-22 25 19)"/><ellipse cx="55" cy="19" rx="13" ry="5" fill="#6ab858" transform="rotate(22 55 19)"/><ellipse cx="20" cy="34" rx="15" ry="5" fill="#4e8c3c" transform="rotate(-22 20 34)"/><ellipse cx="60" cy="34" rx="15" ry="5" fill="#5a9e3a" transform="rotate(22 60 34)"/></svg>`,
  `<svg viewBox="0 0 80 60"><rect width="80" height="60" rx="5" fill="#eaf5e4"/><ellipse cx="40" cy="32" rx="22" ry="16" fill="#7ab84a"/><ellipse cx="40" cy="32" rx="14" ry="10" fill="#5a9e3a"/><ellipse cx="40" cy="32" rx="7" ry="5" fill="#4a8c2a"/><ellipse cx="40" cy="14" rx="7" ry="10" fill="#8ac85a"/><ellipse cx="40" cy="50" rx="7" ry="10" fill="#8ac85a"/><ellipse cx="22" cy="32" rx="10" ry="7" fill="#8ac85a"/><ellipse cx="58" cy="32" rx="10" ry="7" fill="#8ac85a"/></svg>`,
  `<svg viewBox="0 0 80 60"><rect width="80" height="60" rx="5" fill="#eaf5e4"/><line x1="22" y1="55" x2="18" y2="7" stroke="#5a8a3a" stroke-width="2.5"/><line x1="33" y1="55" x2="35" y2="6" stroke="#4a7c38" stroke-width="2"/><line x1="42" y1="55" x2="40" y2="8" stroke="#5a8a3a" stroke-width="2.5"/><line x1="51" y1="55" x2="53" y2="6" stroke="#4a7c38" stroke-width="2"/><line x1="60" y1="55" x2="58" y2="8" stroke="#5a8a3a" stroke-width="2.5"/></svg>`,
];

function genCombos(){
  const c=[];
  for(let i=0;i<4;i++){const a=[false,false,false,false];a[i]=true;c.push(a);}
  for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){const a=[false,false,false,false];a[i]=true;a[j]=true;c.push(a);}
  for(let i=0;i<4;i++){const a=[true,true,true,true];a[i]=false;c.push(a);}
  return c;
}
const ALL_COMBOS=genCombos();
function comboKey(arr){return arr.map((v,i)=>v?i:-1).filter(x=>x>=0).join(',');}

let magicDB={};
let currentComboKey=null;

// 레이아웃: 6열, 각 열에 카드 수 = [2,2,3,3,2,2]
// 순서: 0~3(1장), 4~9(2장), 10~13(3장)
const COL_SIZES=[2,2,3,3,2,2];

function startMagicGame(){showScreen('magicGameScreen');buildComboGrid();}

function buildComboGrid(){
  // 카드 크기: 3개짜리 열 기준으로 계산
  // 가용 높이 = 화면 높이 - 상단 패딩(52) - 하단 패딩(12)
  const availH = window.innerHeight - 64;
  const maxCount = 3; // 가장 많은 열의 카드 수
  const gap = 8;
  // 카드 높이 = (가용높이 - gap*(maxCount-1)) / maxCount
  const cardH = Math.floor((availH - gap*(maxCount-1)) / maxCount);
  // 카드 너비 = 열 너비는 flex:1이므로 JS로 구하기 어려움 → aspect ratio 1.4:1 (가로:세로) 적용
  // 카드가 너무 납작하지 않도록 비율 유지

  let idx=0;
  COL_SIZES.forEach((count,ci)=>{
    const col=document.getElementById('col'+ci);
    col.innerHTML='';
    for(let r=0;r<count;r++){
      if(idx>=14) break;
      const combo=ALL_COMBOS[idx];
      const key=comboKey(combo);
      const card=makeComboCard(combo,key);
      card.style.height=cardH+'px';
      card.style.flexShrink='0';
      col.appendChild(card);
      idx++;
    }
  });
}

function makeComboCard(combo,key){
  const card=document.createElement('div');
  card.className='combo-card';
  combo.forEach((face,ci)=>{
    const mc=document.createElement('div');
    mc.className='mini-card '+(face?'front':'back');
    if(face) mc.innerHTML=CARD_FRONTS[ci];
    card.appendChild(mc);
  });
  const db=magicDB[key];
  if(db&&(db.blue+db.red)>0){
    const badge=document.createElement('div');
    const pred=db.blue>=db.red?'blue':'red';
    badge.className='count-badge '+pred;
    badge.textContent=db.blue+db.red;
    card.appendChild(badge);
  }
  card.onclick=()=>onSelectCombo(key);
  return card;
}

function onSelectCombo(key){
  currentComboKey=key;
  const p=predictPotion(key);
  document.getElementById('predBlue').className='pred-potion blue'+(p==='blue'?' glowing':'');
  document.getElementById('predRed').className='pred-potion red'+(p==='red'?' glowing':'');
  document.getElementById('predOverlay').classList.add('show');
}

function predictPotion(key){
  const db=magicDB[key];
  if(!db||(db.blue+db.red)===0) return Math.random()<0.5?'blue':'red';
  return db.blue>=db.red?'blue':'red';
}

function onChoosePotion(color){
  if(!currentComboKey) return;
  if(!magicDB[currentComboKey]) magicDB[currentComboKey]={blue:0,red:0};
  magicDB[currentComboKey][color]++;
  document.getElementById('predOverlay').classList.remove('show');
  currentComboKey=null;
  buildComboGrid();
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showMagicStart(){showScreen('magicStartScreen');}
function showShapeStart(){showScreen('shapeStartScreen');}

function showExitModal(ctx){
  const btns=document.getElementById('modalBtns'),msg=document.getElementById('modalMsg');
  btns.innerHTML='';
  const isGame=ctx==='magicGame'||ctx==='shapeGame';
  msg.textContent=isGame?'어떻게 하시겠습니까?':'시작 화면으로 돌아가시겠습니까?';
  if(isGame){
    addMBtn(btns,'시작 화면으로','go-home',()=>{hideModal();showScreen('homeScreen');});
    addMBtn(btns,'이전 화면으로','go-back',()=>{hideModal();showScreen(ctx==='magicGame'?'magicStartScreen':'shapeStartScreen');});
    addMBtn(btns,'취소','cancel',hideModal);
  }else{
    addMBtn(btns,'시작 화면으로','go-home',()=>{hideModal();showScreen('homeScreen');});
    addMBtn(btns,'취소','cancel',hideModal);
  }
  document.getElementById('exitModal').classList.add('show');
}
function addMBtn(c,t,cls,fn){const b=document.createElement('button');b.className='modal-btn '+cls;b.textContent=t;b.onclick=fn;c.appendChild(b);}
function hideModal(){document.getElementById('exitModal').classList.remove('show');}

let shapeRound=1,shapeSeq=[],shapeUsed=[];
function shapeMemSteps(){return shapeRound===1?2:3;}
function shapeCurStep(){return shapeSeq.length-1;}
function shapeNeedAns(){return shapeSeq.length>0&&shapeCurStep()>=shapeMemSteps();}
function shapeComputeCorrect(){
  if(!shapeNeedAns()) return null;
  const cur=shapeSeq[shapeCurStep()],two=shapeSeq[shapeCurStep()-2];
  if(shapeRound===1) return cur===two?'same_2':'diff';
  const three=shapeSeq[shapeCurStep()-3];
  if(cur===two) return 'same_2'; if(cur===three) return 'same_3'; return 'diff';
}
function startShapeGame(r){
  shapeRound=r;shapeSeq=[];shapeUsed=[];
  showScreen('shapeGameScreen');
  document.getElementById('roundLabel').textContent=r+'라운드';
  document.getElementById('stepCounter').textContent='';
  document.getElementById('emptyHint').style.display='';
  document.getElementById('shapeStack').style.display='none';
  buildShapeSelector();renderShapeChoices();
}
function selectShape(id){
  shapeSeq.push(id);
  if(!shapeUsed.includes(id)) shapeUsed.push(id);
  document.getElementById('stepCounter').textContent=shapeSeq.length+'번째';
  document.getElementById('emptyHint').style.display='none';
  document.getElementById('shapeStack').style.display='';
  renderShapeStack();buildShapeSelector();renderShapeChoices();
}
function renderShapeStack(){
  const stack=document.getElementById('shapeStack');
  stack.innerHTML='';
  const n=shapeMemSteps();
  const entries=[];
  for(let back=n;back>=1;back--){
    const idx=shapeCurStep()-back;
    if(idx>=0) entries.push({id:shapeSeq[idx],isCurrent:false});
  }
  entries.push({id:shapeSeq[shapeCurStep()],isCurrent:true});
  const baseSize=70;const sizeStep=22;const offsetStep=42;
  entries.forEach((e,i)=>{
    const size=baseSize+i*sizeStep;
    const opacity=e.isCurrent?1:0.18+i*0.22;
    const svgSize=Math.round(size*0.62);
    const el=document.createElement('div');
    el.className=(e.isCurrent?'shape-current-card shape-animate':'shape-ghost');
    el.style.cssText=`width:${size}px;height:${size}px;left:${i*offsetStep}px;top:calc(50% - ${size/2}px);z-index:${i+1};`+(e.isCurrent?'':`opacity:${opacity};`);
    el.innerHTML=`<svg viewBox="0 0 100 100" width="${svgSize}" height="${svgSize}">${SHAPES.find(x=>x.id===e.id).svg}</svg>`;
    stack.appendChild(el);
  });
}
function buildShapeSelector(){
  const panel=document.getElementById('shapeSelector');panel.innerHTML='';
  if(shapeUsed.length<3){
    const grid=document.createElement('div');grid.className='shape-grid';
    SHAPES.forEach(s=>{
      const item=document.createElement('div');item.className='shape-item';
      item.innerHTML=`<svg viewBox="0 0 100 100">${s.svg}</svg>`;
      item.onclick=()=>selectShape(s.id);grid.appendChild(item);
    });
    panel.appendChild(grid);
  }else{
    const list=document.createElement('div');list.className='mini-shape-list';
    shapeUsed.forEach(id=>{
      const s=SHAPES.find(x=>x.id===id);
      const item=document.createElement('div');item.className='mini-shape-item';
      item.innerHTML=`<svg viewBox="0 0 100 100">${s.svg}</svg>`;
      item.onclick=()=>selectShape(id);list.appendChild(item);
    });
    panel.appendChild(list);
  }
}
function renderShapeChoices(){
  const panel=document.getElementById('rightPanel');panel.innerHTML='';
  const disabled=!shapeNeedAns();const correctAns=shapeComputeCorrect();
  const defs=shapeRound===1
    ?[{key:'SPACE BAR',label:'다름',value:'diff'},{key:'←',label:'같음',value:'same_2'}]
    :[{key:'SPACE BAR',label:'다름 (둘 다 아님)',value:'diff'},{key:'←',label:'같음 (2번째 전)',value:'same_2'},{key:'→',label:'같음 (3번째 전)',value:'same_3'}];
  defs.forEach(c=>{
    const div=document.createElement('div');
    const isLit=!disabled&&c.value===correctAns;
    div.className='choice-item'+(disabled?' disabled':'')+(isLit?' lit':'');
    div.innerHTML=`<div class="choice-key">${c.key}</div><div class="choice-label">${c.label}</div>`;
    panel.appendChild(div);
  });
}
</script>
